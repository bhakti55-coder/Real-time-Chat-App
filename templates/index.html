<!DOCTYPE html>
<html>
<head>
    <title>Real-time Chat - Week 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

    {% if 'username' in session %}
        <h2>Welcome, {{ session['username'] }}! <a href="/logout">Logout</a></h2>
        
        <ul id="messages" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px;"></ul>
        <input type="text" id="myMessage" placeholder="Type a message...">
        <button id="sendBtn">Send</button>

        <script>
            var socket = io();
            
            // When the server sends a message, put it on the screen
            socket.on('message', function(data) {
                var ul = document.getElementById('messages');
                var li = document.createElement('li');
                // Format: "Username: Message"
                li.appendChild(document.createTextNode(data.user + ': ' + data.text));
                ul.appendChild(li);
            });

            // When you click send, send the message to the server
            document.getElementById('sendBtn').onclick = function() {
                var msg = document.getElementById('myMessage').value;
                socket.emit('message', msg);
                document.getElementById('myMessage').value = ''; // Clear the box
            };
        </script>

    {% else %}
        <h2>Login or Register to Chat</h2>
        
        <div style="margin-bottom: 20px;">
            <h3>Login</h3>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>

        <div>
            <h3>Create an Account</h3>
            <form action="/register" method="POST">
                <input type="text" name="username" placeholder="Choose a Username" required>
                <input type="password" name="password" placeholder="Choose a Password" required>
                <button type="submit">Register</button>
            </form>
        </div>
    {% endif %}

</body>
</html>
