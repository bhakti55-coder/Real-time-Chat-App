<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-time Chat - Week 4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .main-container { display: flex; gap: 20px; }
        .chat-section { flex: 3; }
        .users-section { flex: 1; border: 1px solid #007BFF; padding: 10px; border-radius: 5px; background: #f8f9fa; }
        #messages { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; list-style: none; margin-bottom: 10px; }
        #onlineUsers { list-style-type: square; padding-left: 20px; color: #007BFF; font-weight: bold; }
        .status { color: grey; font-style: italic; }
        .auth-container { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; width: 300px; }
    </style>
</head>
<body>

    {% if 'username' in session %}
        <h2>Welcome, {{ session['username'] }}! <a href="/logout">Logout</a></h2>
        
        <div style="margin-bottom: 15px;">
            <label><strong>Select Room:</strong></label>
            <select id="roomSelect">
                <option value="General">General</option>
                <option value="Internship-Group">Internship-Group</option>
            </select>
            <button id="joinBtn">Join Room</button>
        </div>

        <div class="main-container">
            <div class="chat-section">
                <ul id="messages"></ul>
                <input type="text" id="myMessage" placeholder="Type a message..." style="width: 70%;">
                <button id="sendBtn">Send</button>
            </div>

            <div class="users-section">
                <h3>🟢 Online Now</h3>
                <ul id="onlineUsers"></ul>
            </div>
        </div>

        <script>
            var socket = io();
            var currentRoom = "General";

            socket.emit('join', {'room': currentRoom});

            // NEW: Listen for the updated users list from the server
            socket.on('update_users', function(users) {
                var usersList = document.getElementById('onlineUsers');
                usersList.innerHTML = ""; // Clear old list
                users.forEach(function(user) {
                    var li = document.createElement('li');
                    li.textContent = user;
                    usersList.appendChild(li);
                });
            });

            socket.on('status', function(data) {
                var ul = document.getElementById('messages');
                var li = document.createElement('li');
                li.className = "status";
                li.appendChild(document.createTextNode(data.msg));
                ul.appendChild(li);
                ul.scrollTop = ul.scrollHeight;
            });

            socket.on('message', function(data) {
                var ul = document.getElementById('messages');
                var li = document.createElement('li');
                li.innerHTML = "<strong>" + data.user + ":</strong> " + data.text;
                ul.appendChild(li);
                ul.scrollTop = ul.scrollHeight;
            });

            document.getElementById('joinBtn').onclick = function() {
                var newRoom = document.getElementById('roomSelect').value;
                if (newRoom !== currentRoom) {
                    document.getElementById('messages').innerHTML = "";
                    currentRoom = newRoom;
                    socket.emit('join', {'room': currentRoom});
                }
            };

            document.getElementById('sendBtn').onclick = function() {
                var msgInput = document.getElementById('myMessage');
                if (msgInput.value.trim() !== "") {
                    socket.emit('message', {'msg': msgInput.value, 'room': currentRoom});
                    msgInput.value = ''; 
                }
            };
        </script>

    {% else %}
        <h2>Login or Register to Chat</h2>
        <div class="auth-container">
            <h3>Login</h3>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required><br><br>
                <input type="password" name="password" placeholder="Password" required><br><br>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="auth-container">
            <h3>Create an Account</h3>
            <form action="/register" method="POST">
                <input type="text" name="username" placeholder="Choose a Username" required><br><br>
                <input type="password" name="password" placeholder="Choose a Password" required><br><br>
                <button type="submit">Register</button>
            </form>
        </div>
    {% endif %}

</body>
</html>
