<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-time Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .main-container { display: flex; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .chat-section { flex: 3; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .users-section { flex: 1; border-left: 3px solid #007BFF; padding: 15px; background: #ffffff; border-radius: 10px; }
        #messages { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 10px; list-style: none; margin-bottom: 5px; background: #fafafa; }
        #messages li { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #e9ecef; width: fit-content; }
        
        /* New Advanced CSS */
        .time-stamp { font-size: 0.7em; color: #888; margin-left: 10px; }
        .typing-indicator { height: 20px; font-size: 0.85em; color: #888; font-style: italic; margin-bottom: 10px; padding-left: 5px;}
        
        .status { color: #6c757d; font-style: italic; font-size: 0.9em; background: none !important; }
        input[type="text"], input[type="password"] { width: 75%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px;}
        button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .login-box { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    </style>
</head>
<body>

    {% if 'username' in session %}
        <div style="text-align: center; margin-bottom: 20px;">
            <h2>Welcome to the Hub, {{ session['username'] }}! <a href="/logout" style="font-size: 0.6em; color: red;">Logout</a></h2>
            <label><strong>Current Room:</strong></label>
            <select id="roomSelect">
                <option value="General">General</option>
                <option value="Internship-Group">Internship-Group</option>
                <option value="Tech-Support">Tech-Support</option>
            </select>
            <button id="joinBtn">Switch Room</button>
        </div>

        <div class="main-container">
            <div class="chat-section">
                <ul id="messages"></ul>
                <div id="typingDisplay" class="typing-indicator"></div>
                
                <input type="text" id="myMessage" placeholder="Write something amazing...">
                <button id="sendBtn">Send</button>
            </div>

            <div class="users-section">
                <h3>🟢 In This Room</h3>
                <ul id="onlineUsers"></ul>
            </div>
        </div>

        <script>
            var socket = io();
            var currentRoom = "General";

            socket.emit('join', {'room': currentRoom});

            // RECEIVE BROADCAST (Now with timestamps)
            socket.on('message', function(data) {
                var ul = document.getElementById('messages');
                var li = document.createElement('li'); 
                li.innerHTML = "<strong>" + data.user + "</strong>: " + data.text + "<span class='time-stamp'>" + data.time + "</span>";
                ul.appendChild(li); 
                ul.scrollTop = ul.scrollHeight; 
            });

            // LOAD HISTORY (Now with timestamps)
            socket.on('load_history', function(messages) {
                var ul = document.getElementById('messages');
                ul.innerHTML = ""; 
                
                messages.forEach(function(msg) {
                    var li = document.createElement('li');
                    li.innerHTML = "<strong>" + msg.user + "</strong>: " + msg.text + "<span class='time-stamp'>" + msg.time + "</span>";
                    ul.appendChild(li); 
                });
                
                ul.scrollTop = ul.scrollHeight; 
            });

            // --- TYPING INDICATOR LOGIC ---
            var msgInput = document.getElementById('myMessage');
            var typingTimer;
            var isTyping = false;

            // Detect when user types
            msgInput.addEventListener('input', function() {
                if (!isTyping) {
                    isTyping = true;
                    socket.emit('typing', {'room': currentRoom});
                }
                
                clearTimeout(typingTimer);
                // If they stop typing for 1 second (1000ms), remove the indicator
                typingTimer = setTimeout(function() {
                    isTyping = false;
                    socket.emit('stop_typing', {'room': currentRoom});
                }, 1000);
            });

            // Listen for others typing
            socket.on('user_typing', function(data) {
                document.getElementById('typingDisplay').innerText = data.user + " is typing...";
            });

            socket.on('user_stop_typing', function() {
                document.getElementById('typingDisplay').innerText = "";
            });

            // SEND MESSAGE 
            document.getElementById('sendBtn').onclick = function() {
                if (msgInput.value.trim() !== "") {
                    socket.emit('message', {'msg': msgInput.value, 'room': currentRoom});
                    msgInput.value = ''; 
                    // Stop the typing indicator instantly when sent
                    clearTimeout(typingTimer);
                    isTyping = false;
                    socket.emit('stop_typing', {'room': currentRoom});
                }
            };

            // UPDATE USER LIST
            socket.on('update_users', function(users) {
                var usersList = document.getElementById('onlineUsers');
                usersList.innerHTML = ""; 
                users.forEach(function(user) {
                    var li = document.createElement('li');
                    li.textContent = user;
                    usersList.appendChild(li);
                });
            });

            // Room Switch Logic
            document.getElementById('joinBtn').onclick = function() {
                var newRoom = document.getElementById('roomSelect').value;
                if (newRoom !== currentRoom) {
                    document.getElementById('messages').innerHTML = ""; 
                    currentRoom = newRoom;
                    socket.emit('join', {'room': currentRoom});
                }
            };
        </script>

    {% else %}
        <div class="login-box">
            <h2>Login to Chat</h2>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required><br>
                <input type="password" name="password" placeholder="Password" required><br>
                <button type="submit" style="width: 75%;">Login</button>
            </form>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <h2>Or Register</h2>
            <form action="/register" method="POST">
                <input type="text" name="username" placeholder="Choose a Username" required><br>
                <input type="password" name="password" placeholder="Choose a Password" required><br>
                <button type="submit" style="width: 75%; background-color: #28a745;">Register</button>
            </form>
        </div>
    {% endif %}

</body>
</html>
